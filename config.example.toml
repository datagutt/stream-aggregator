# StreamAggregator Configuration
# This file contains all configuration options for the StreamAggregator service

[server]
host = "127.0.0.1"
port = 8080

[auth]
# API keys for authentication (comma-separated)
api_keys = []
# Require authentication for all requests (including reads)
require_all = false

[scheduler]
# Scrape interval in seconds
interval_secs = 300
# Maximum concurrent scrape tasks
max_concurrent = 10

[store]
# Storage backend type: "memory" or "diesel"
# - "memory": In-memory storage (data lost on restart)
# - "diesel": Persistent storage using Diesel ORM
backend = "diesel"

# Database connection URL (used when backend = "diesel")
# For SQLite (default): Path to database file
database_url = "stream_aggregator.db"
# For PostgreSQL: Full connection URL
# database_url = "postgres://user:password@localhost:5432/stream_aggregator"
#
# Diesel automatically detects the database type from the URL format:
# - "path/to/file.db" or ":memory:" → SQLite
# - "postgres://..." → PostgreSQL

[providers.twitch]
enabled = true
# client_id = "your_twitch_client_id"
# client_secret = "your_twitch_client_secret"

[providers.youtube]
enabled = true

[providers.kick]
enabled = true

[providers.dlive]
enabled = true

[providers.trovo]
enabled = true
# client_id = ""

[providers.guac]
enabled = true

[providers.angelthump]
enabled = true

[providers.robotstreamer]
enabled = true

[providers.tiktok]
enabled = true
# Optional: Custom bridge URL (default: http://127.0.0.1:3456)
# bridge_url = "http://127.0.0.1:3456"
# Optional: Custom path to the nodejs-bridge directory
# In Docker, the bridge is at /app/nodejs-bridge
# bridge_path = "/app/nodejs-bridge"
